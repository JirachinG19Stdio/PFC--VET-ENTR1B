spring:
  datasource:
    url: jdbc:h2:mem:biopet_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
  flyway:
    enabled: false
  cache:
    type: simple

security:
  jwt:
    secret: 9c8f9a7d6e5b4c3a2d1f0e9c8b7a6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000

app:
  cors:
    allowed-origins: http://localhost:4200
